version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gitsocial-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gitsocial_db
    ports:
      # Sol taraf senin lokal portun (.env'den gelecek), sağ taraf Docker'ın iç portu (hep 5432 kalır)
      - "${LOCAL_DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: