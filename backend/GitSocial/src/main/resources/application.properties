spring.application.name=GitSocial

spring.config.import=optional:file:../../.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:${LOCAL_DB_PORT}/gitsocial_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.security.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.upload-folder=${CLOUDINARY_UPLOAD_FOLDER:gitsocial/posts}
app.cloudinary.max-file-size-bytes=5242880
app.cloudinary.upload-timeout-ms=5000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
