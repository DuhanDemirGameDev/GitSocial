# Veri Taban? Ayarlar? (DB_USER ve DB_PASSWORD kullan?ld?)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Canl? ortamda tablolar? sadece g³nceller ve SQL loglar?n? kapat?r (h?z ińin)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# G³venlik ve CORS (FRONTEND_ORIGIN olarak d³zeltildi)
app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origin=${FRONTEND_ORIGIN}

# --- E?ER PROJENDE CLOUDINARY VE MAIL AYARLARINI PROPERTIES'TEN OKUYORSAN BUNLARI DA EKLE ---
# Cloudinary Ayarlar?
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Mail Ayarlar?
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true